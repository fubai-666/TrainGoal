resize: 0.25  # image resize factor, to also resize the trajectories to fit image scale
learning_rate: 0.001
batch_size: 32
num_epochs: 100
start_epoch: 0
bfloat16: false

model_dir: ./models/bs32_lr1e-3

num_obs: 15
num_pred: 90
mode_train: 2
img_size_r: 0.5

#encoder_channels:  # list of kernels in encoder
#  - 128
#  - 128
#  - 256
#  - 256
#  - 256

#decoder_channels:  # list of kernels in decoder
#  - 256
#  - 256
#  - 256
#  - 128
#  - 128
  
encoder_channels:  # list of kernels in encoder
  - 256
  - 256
  - 512
  - 512
  - 512

decoder_channels:  # list of kernels in decoder
  - 512
  - 512
  - 512
  - 256
  - 256

# list of selected goal and waypoints as timestep idx, e.g. 14 means the 14th future timestep is used as a waypoint,
# last element is goal timestep
waypoints:
  - 0
  # - 4
  - 9
  # - 14
  - 19
  # - 24
  - 29
  # - 34
  - 39
  # - 44
  - 49 # sometimes not good
  # - 54
  - 59 # sometimes not good
  # - 64
  - 69
  # - 74
  - 79 # bad
#  - 89 # bad 
  - 89
  - 99
  - 109
  - 119
  - 129
  - 139
  - 149


temperature: 1.0
segmentation_model_fp: None
semantic_classes: 1 #3

loss_scale: 1000  # factor to scale the loss

#kernlen: 5  # (image) size of Gaussian kernel used for ground-truth Gaussian heatmap
#nsig: 2  # sigma of Gaussian kernel used for ground-truth Gaussian heatmap
kernlen: 31  # (image) size of Gaussian kernel used for ground-truth Gaussian heatmap
nsig: 4  # sigma of Gaussian kernel used for ground-truth Gaussian heatmap

use_features_only: False  # if True -> use segmentation features from penultimate layer, if False -> use softmax class predictions
unfreeze: 300  # Unfreeze semantic segmentation model weights after this # of epochs

# TTST
use_TTST: False
rel_threshold: 0.01

# CWS
use_CWS: True
CWS_params: 
  # None
  sigma_factor: 6
  ratio: 2
  rot: True
